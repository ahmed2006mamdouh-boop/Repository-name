<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنبيه أمني</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: sans-serif;
            text-align: center;
            padding-top: 5%;
            direction: rtl;
        }
        .warning {
            color: red;
            font-size: 2rem;
            font-weight: bold;
        }
        .console {
            text-align: right;
            width: 85%;
            margin: 20px auto;
            background: #111;
            padding: 15px;
            border: 1px solid red;
            min-height: 150px;
            font-size: 1.1rem;
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div class="warning">⚠️ تحذير خطير: تم اختراق الهاتف بالكامل! ⚠️</div>
    <p style="font-size: 1.2rem; color: #fff;">جاري سحب وتشفير ملفات النظام والبيانات الشخصية...</p>
    
    <div class="console" id="console"></div>

    <h2 style="color: yellow; font-size: 1.3rem;">سيتم حذف نظام التشغيل وفرمطة الهاتف خلال: <span id="timer" style="color: red; font-size: 2rem;">30</span> ثانية</h2>

    <script>
        const lines = [
            "جاري الاتصال بالسيرفر الخارجي...",
            "تم تخطي جدار الحماية بنجاح...",
            "جاري الدخول إلى الذاكرة الداخلية...",
            "تم الوصول إلى معرض الصور والملفات...",
            "جاري نسخ ومزامنة المحادثات...",
            "جاري سحب جهات الاتصال والأرقام...",
            "جاري زرع فيروس التشفير..."
        ];
        
        let lineIndex = 0;
        const consoleEl = document.getElementById('console');
        
        function typeLine() {
            if (lineIndex < lines.length) {
                consoleEl.innerHTML += "✔ " + lines[lineIndex] + "<br><br>";
                lineIndex++;
                setTimeout(typeLine, 1500);
            }
        }
        
        window.onload = function() {
            typeLine();
            
            let timeLeft = 30;
            const timerEl = document.getElementById('timer');
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("بوم! راحت عليك.. تعيش وتاخد غيرها يا صاحبي! 😂");
                    document.body.innerHTML = "<h1 style='color:white; padding-top:20%; font-size: 2.5rem;'>مقلب يا غالي! 😂❤️<br><br><span style='color: #00ff00;'>شربت الهاك بنجاح.. ومفيش أي حاجة اتسرقت متقلقش!</span></h1>";
                }
            }, 1000);
        };
    </script>
</body>
</html>
